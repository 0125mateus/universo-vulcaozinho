<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" role="img" aria-label="Recrear — Recreação e Lazer">
  <defs>
    <filter id="s" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#123A6B" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- ícone oficial: figura abraçando / sorriso -->
