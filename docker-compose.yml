services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vulcaozinho}
      POSTGRES_USER: ${POSTGRES_USER:-vulcaozinho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vulcaozinho} -d ${POSTGRES_DB:-vulcaozinho}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_SECURE_COOKIES: ${DJANGO_SECURE_COOKIES:-False}
      DATABASE_URL: postgres://${POSTGRES_USER:-vulcaozinho}:${POSTGRES_PASSWORD:-change-me-in-production}@db:5432/${POSTGRES_DB:-vulcaozinho}
      REDIS_URL: redis://redis:6379/0
      TELAO_API_KEY: ${TELAO_API_KEY:-vulcaozinho-telao-dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUN_SEED: ${RUN_SEED:-1}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-1}
    volumes:
      - static_data:/app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_data:
