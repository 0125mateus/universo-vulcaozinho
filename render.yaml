# Blueprint Render — Universo Vulcãozinho
# Dashboard Render → New → Blueprint → conectar repositório GitHub

databases:
  - name: vulcaozinho-db
    plan: free
    databaseName: vulcaozinho
    user: vulcaozinho_user

services:
  - type: web
    name: universo-vulcaozinho
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECURE_COOKIES
        value: "true"
      - key: DEV_SKIP_LOGIN
        value: "false"
      - key: RUN_SEED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: vulcaozinho-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: TELAO_API_KEY
        generateValue: true
