# Blueprint Render — Universo Vulcãozinho
# Plano free: apenas 1 PostgreSQL por conta — reutilize o banco existente (consulta-db).

services:
  - type: web
    name: universo-vulcaozinho
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECURE_COOKIES
        value: "true"
      - key: DEV_SKIP_LOGIN
        value: "false"
      - key: RUN_SEED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELAO_API_KEY
        generateValue: true
