{% load static %}
<div class="assistant-widget" id="assistant-widget">
    <button type="button" class="assistant-fab" id="assistant-fab" aria-label="Abrir assistente Recrear">
        <span class="assistant-fab-emoji">✨</span>
        <span class="assistant-fab-label">Inteligente</span>
    </button>

    <div class="assistant-panel" id="assistant-panel" hidden>
        <header class="assistant-header">
            <div>
                <strong>Recrear Inteligente</strong>
                <span class="assistant-mode" id="assistant-mode">Orientação</span>
            </div>
            <button type="button" class="assistant-close" id="assistant-close" aria-label="Fechar">×</button>
        </header>

        <div class="assistant-messages" id="assistant-messages"></div>
        <div class="assistant-suggestions" id="assistant-suggestions"></div>

        <form class="assistant-input-row" id="assistant-form">
            {% csrf_token %}
            <input type="text" id="assistant-input" placeholder="Pergunte como usar o sistema..." autocomplete="off">
            <button type="submit" class="assistant-send" id="assistant-send">Enviar</button>
        </form>
    </div>
</div>
