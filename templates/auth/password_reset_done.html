{% extends 'base.html' %}
{% block title %}E-mail enviado{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-emoji">📧</span>
            <h2>Verifique seu e-mail</h2>
            <p>Se existir uma conta com esse e-mail, você receberá instruções para redefinir a senha.</p>
            <p style="font-size:0.85rem;margin-top:0.75rem;">Em desenvolvimento, veja o link no <strong>terminal do servidor</strong>.</p>
        </div>
        <p class="auth-links"><a href="{% url 'login' %}">← Voltar ao login</a></p>
    </div>
</div>
{% endblock %}
