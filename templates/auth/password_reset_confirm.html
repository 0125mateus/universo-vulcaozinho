{% extends 'base.html' %}
{% block title %}Nova senha{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-emoji">🔒</span>
            <h2>Definir nova senha</h2>
        </div>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Salvar senha</button>
        </form>
    </div>
</div>
{% endblock %}
