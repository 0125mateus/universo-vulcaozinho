{% extends 'base.html' %}

{% block title %}Recuperar senha{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-emoji">🔑</span>
            <h2>Esqueci a senha</h2>
            <p>Informe seu e-mail cadastrado. Enviaremos instruções (console em desenvolvimento).</p>
        </div>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Enviar link</button>
        </form>
        <p class="auth-links"><a href="{% url 'login' %}">← Voltar ao login</a></p>
    </div>
</div>
{% endblock %}
